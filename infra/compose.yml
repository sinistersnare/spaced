# Local development compose for Spaced.
#
# Runs the AT Protocol infrastructure: Caddy, PDS, PLC directory, and Leaf.
# Also runs the full observability stack: Grafana, Loki, Mimir, Tempo, Pyroscope, Alloy.
# The Roomy web app runs separately from the roomy repo (pnpm dev there).
# lab-bridge runs natively via: pnpm --filter lab-bridge dev
#
# First-time setup: pnpm setup  (from infra/ directory)
# Daily use:        docker compose up

name: spaced-local

services:

  # ── Reverse proxy (HTTPS for localhost domains) ──────────────────────────
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - roomy-dev
    restart: unless-stopped

  # ── Personal Data Server ─────────────────────────────────────────────────
  pds:
    image: node:20-alpine
    working_dir: /pds
    command: sh -c "npm install && npm start"
    volumes:
      - ./pds:/pds
      - pds-data:/data
    environment:
      - PDS_HOSTNAME=localhost
      - PDS_PORT=2583
      - PDS_ADMIN_PASSWORD=pwpw
      - PDS_JWT_SECRET=local-dev-secret-key-change-in-production
      - PDS_PLC_ROTATION_KEY_K256_PRIVATE_KEY_HEX=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      - PDS_BLOBSTORE_DISK_LOCATION=/data/blocks
      - PDS_DB_SQLITE_LOCATION=/data/pds.sqlite
      - PDS_DID_PLC_URL=http://plc-directory:3000
      - PDS_SERVICE_DID=did:web:localhost
      - PDS_DATA_DIRECTORY=/data
      - PDS_CRAWLERS=
      - PDS_INVITE_REQUIRED=true
      - PDS_DEV_MODE=true
      - PDS_SERVICE_HANDLE_DOMAINS=.localhost
      - PDS_HANDLE_RESOLVER_NAMESERVERS=1.1.1.1,8.8.8.8
    ports:
      - "2583:2583"
    networks:
      - roomy-dev
    depends_on:
      plc-directory:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:2583/xrpc/_health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── PLC Directory (DID resolution) ───────────────────────────────────────
  plc-directory:
    image: ghcr.io/zicklag/did-plc-server:plc-053ddecb6a12ce0e996d300f9395899adf02dd05
    ports:
      - "3001:3000"
    environment:
      - DB_CREDS_JSON={"username":"postgres","password":"password","host":"plc-db","port":"5432","database":"postgres"}
      - DB_MIGRATE_CREDS_JSON={"username":"postgres","password":"password","host":"plc-db","port":"5432","database":"postgres"}
      - ENABLE_MIGRATIONS=true
      - PORT=3000
    networks:
      - roomy-dev
    depends_on:
      plc-db:
        condition: service_healthy
    restart: unless-stopped

  plc-db:
    image: postgres
    environment:
      - POSTGRES_PASSWORD=password
    volumes:
      - plc-db-data:/var/lib/postgresql
    networks:
      - roomy-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Leaf Server (event streaming) ────────────────────────────────────────
  leaf-server:
    image: ghcr.io/muni-town/leaf:sha-7a3e136
    ports:
      - "5530:5530"
    volumes:
      - leaf-data:/data
    environment:
      - DID=did:web:app.localhost
      - PLC_DIRECTORY=http://plc-directory:3000
      - ENDPOINT=https://app.localhost/leaf/
    networks:
      - roomy-dev
    restart: unless-stopped

  # ── Observability stack ───────────────────────────────────────────────────

  pyroscope:
    image: grafana/pyroscope:latest
    ports:
      - "4040:4040"
    networks:
      - roomy-dev

  tempo:
    image: grafana/tempo:2.9.1
    command: ["-config.file=/etc/tempo.yaml"]
    configs:
      - source: tempo-config
        target: /etc/tempo.yaml
    ports:
      - "3200:3200"
    networks:
      - roomy-dev

  loki:
    image: grafana/loki:latest
    command: -config.file=/etc/loki/local-config.yaml
    configs:
      - source: loki-config
        target: /etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - roomy-dev

  mimir:
    image: grafana/mimir:latest
    command: --config.file=/etc/mimir/demo.yaml
    configs:
      - source: mimir-config
        target: /etc/mimir/demo.yaml
    ports:
      - "9009:9009"
    networks:
      - roomy-dev

  alloy:
    image: grafana/alloy:latest
    command: run --disable-reporting --server.http.listen-addr=0.0.0.0:5005 /etc/alloy/config.alloy
    configs:
      - source: alloy-config
        target: /etc/alloy/config.alloy
    ports:
      - "5005:5005"   # Alloy UI
      - "12345:12345" # Faro RUM receiver
      - "4317:4317"   # OTLP gRPC
    networks:
      - roomy-dev

  grafana:
    image: grafana/grafana:12.3.0
    configs:
      - source: grafana-datasources
        target: /etc/grafana/provisioning/datasources/datasources.yaml
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
      - GF_INSTALL_PLUGINS=grafana-pyroscope-app
    ports:
      - "3000:3000"
    networks:
      - roomy-dev

networks:
  roomy-dev:
    name: roomy-dev
    external: true

volumes:
  leaf-data:
  plc-db-data:
  pds-data:
  caddy-data:
  caddy-config:

configs:
  loki-config:
    content: |
      auth_enabled: false

      server:
        http_listen_port: 3100

      common:
        ring:
          instance_addr: 127.0.0.1
          kvstore:
            store: inmemory
        replication_factor: 1
        path_prefix: /tmp/loki

      schema_config:
        configs:
        - from: 2020-05-15
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

      storage_config:
        filesystem:
          directory: /tmp/loki/chunks

  mimir-config:
    content: |
      multitenancy_enabled: false

      blocks_storage:
        backend: filesystem
        bucket_store:
          sync_dir: /tmp/mimir/tsdb-sync
        filesystem:
          dir: /tmp/mimir/data/tsdb
        tsdb:
          dir: /tmp/mimir/tsdb

      compactor:
        data_dir: /tmp/mimir/compactor
        sharding_ring:
          kvstore:
            store: memberlist

      distributor:
        ring:
          instance_addr: 127.0.0.1
          kvstore:
            store: memberlist

      ingester:
        ring:
          instance_addr: 127.0.0.1
          kvstore:
            store: memberlist
          replication_factor: 1

      ruler_storage:
        backend: filesystem
        filesystem:
          dir: /tmp/mimir/rules

      server:
        http_listen_port: 9009
        log_level: info

      store_gateway:
        sharding_ring:
          replication_factor: 1

  alloy-config:
    content: |
      // Write metrics to mimir
      prometheus.remote_write "mimir" {
          endpoint {
              name = "default"
              url  = "http://mimir:9009/api/v1/push"
              queue_config { }
              metadata_config { }
          }
      }

      // Write traces to tempo
      otelcol.exporter.otlp "tempo" {
          retry_on_failure {
              max_elapsed_time = "1m0s"
          }

          client {
              endpoint = "tempo:4317"
              tls {
                insecure             = true
                insecure_skip_verify = true
              }
          }
      }

      // Write logs to loki
      loki.write "loki" {
          endpoint {
              url = "http://loki:3100/loki/api/v1/push"
          }
      }

      loki.process "frontend" {
          forward_to = [loki.write.loki.receiver]

          stage.logfmt {
              mapping = { "service_name" = "app_name", kind = "" }
          }

          stage.labels {
              values = { "kind" = "kind", "service_name" = "service_name", "app" = "service_name" }
          }

          stage.match {
              selector = "{kind=\"exception\"}"

              stage.template {
                source = "const_error"
                template = "error"
              }

              stage.structured_metadata {
                  values = {
                      "level" = "const_error",
                  }
              }
          }
      }

      logging {
          level = "info"
      }

      // Receive logs & traces from faro agent
      faro.receiver "frontend" {
          server {
              listen_address           = "0.0.0.0"
              listen_port              = 12345
              cors_allowed_origins     = ["http://127.0.0.1:5173", "http://localhost:5173"]
              api_key                  = "bad_api_key"
              max_allowed_payload_size = "10MiB"

              rate_limiting {
                  rate = 100
              }
          }

          sourcemaps { }

          output {
              logs   = [loki.process.frontend.receiver]
              traces = [otelcol.exporter.otlp.tempo.input]
          }
      }

      // Receive OTLP data
      otelcol.receiver.otlp "default" {
          grpc {
              include_metadata = true
          }

          output {
              metrics = [otelcol.processor.batch.default.input]
              logs    = [otelcol.exporter.loki.default.input]
              traces  = [otelcol.exporter.otlp.tempo.input]
          }
      }

      // Batch metrics
      otelcol.processor.batch "default" {
        output {
          metrics = [otelcol.exporter.prometheus.default.input]
        }
      }

      // Convert metrics to prometheus
      otelcol.exporter.prometheus "default" {
        forward_to = [prometheus.remote_write.mimir.receiver]
      }

      // Convert logs to loki
      otelcol.exporter.loki "default" {
        forward_to = [loki.write.loki.receiver]
      }

  tempo-config:
    content: |
      stream_over_http_enabled: true
      server:
        http_listen_port: 3200
        log_level: info

      query_frontend:
        search:
          duration_slo: 5s
          throughput_bytes_slo: 1.073741824e+09
          metadata_slo:
            duration_slo: 5s
            throughput_bytes_slo: 1.073741824e+09
        trace_by_id:
          duration_slo: 5s

      distributor:
        receivers:
          otlp:
            protocols:
              grpc:
                endpoint: "tempo:4317"

      ingester:
        max_block_duration: 5m

      compactor:
        compaction:
          block_retention: 1h

      metrics_generator:
        registry:
          external_labels:
            source: tempo
            cluster: docker-compose
        storage:
          path: /var/tempo/generator/wal
          remote_write:
            - url: http://mimir:9009/api/v1/push
              send_exemplars: true
        traces_storage:
          path: /var/tempo/generator/traces

      storage:
        trace:
          backend: local
          wal:
            path: /var/tempo/wal
          local:
            path: /var/tempo/blocks

      overrides:
        defaults:
          metrics_generator:
            processors: [service-graphs, span-metrics, local-blocks]
            generate_native_histograms: both

  grafana-datasources:
    content: |
      apiVersion: 1
      datasources:
        - name: Pyroscope
          uid: pyroscope
          type: grafana-pyroscope-datasource
          access: proxy
          url: http://pyroscope:4040
        - name: Mimir
          uid: mimir
          type: prometheus
          access: proxy
          url: http://mimir:9009/prometheus
          basicAuth: false
          readOnly: true
        - name: Loki
          uid: loki
          type: loki
          access: proxy
          url: http://loki:3100
          basicAuth: false
          editable: false
        - name: Tempo
          uid: tempo
          type: tempo
          access: proxy
          url: http://tempo:3200
          basicAuth: false
          isDefault: true
          editable: false
          jsonData:
            streamingEnabled:
              metrics: true
              search: true
            tracesToMetrics:
              datasourceUid: mimir
            tracesToProfiles:
              datasourceUid: pyroscope
              profileTypeId: "process_cpu:cpu:nanoseconds:cpu:nanoseconds"
